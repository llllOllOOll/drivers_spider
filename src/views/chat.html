{% block "chat" %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat Demo — Spider</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        body { background:#0b1121; color:white; min-height: 100vh; }
        .chat-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 1rem;
        }
        .chat-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .chat-header h1 {
            color: #ffc439;
            font-weight: 800;
            font-size: 2.5rem;
        }
        .chat-box {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .chat-message {
            margin-bottom: 0.75rem;
            padding: 0.5rem 1rem;
            background: #1e293b;
            border-radius: 8px;
            border-left: 3px solid #ffc439;
        }
        .chat-message .user {
            color: #ffc439;
            font-weight: bold;
            margin-right: 0.5rem;
        }
        .chat-message .text {
            color: #e2e8f0;
        }
        .chat-message.system {
            border-left-color: #64748b;
            background: #0f172a;
            font-style: italic;
        }
        .chat-message.system .user {
            color: #64748b;
        }
        .chat-input-area {
            display: flex;
            gap: 0.5rem;
        }
        .chat-input-area input {
            background: #0f172a;
            border: 1px solid #1e293b;
            color: white;
        }
        .chat-input-area input::placeholder {
            color: #64748b;
        }
        .chat-input-area input:focus {
            border-color: #ffc439;
            box-shadow: 0 0 0 2px rgba(255, 196, 57, 0.2);
        }
        .btn-send {
            background-color: #ffc439 !important;
            color: #000 !important;
            border: none !important;
            font-weight: bold;
        }
        .btn-send:hover {
            background-color: #e6b033 !important;
        }
        .status {
            text-align: center;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .status.connected {
            background: #1e293b;
            color: #4ade80;
        }
        .status.disconnected {
            background: #1e293b;
            color: #f87171;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #64748b;
            text-decoration: none;
        }
        .back-link:hover {
            color: #ffc439;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>WebSocket Chat</h1>
            <p class="has-text-grey-light">Real-time messaging with Spider</p>
        </div>

        <div id="status" class="status disconnected">Disconnected</div>

        <div id="chat-box" class="chat-box"></div>

        <div class="chat-input-area">
            <input id="username" class="input" type="text" placeholder="Your name" style="width: 150px;" value="Guest">
            <input id="message" class="input" type="text" placeholder="Type a message..." style="flex: 1;">
            <button id="send-btn" class="button btn-send" onclick="sendMessage()">Send</button>
        </div>

        <a href="/" class="back-link">← Back to Spider</a>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const statusDiv = document.getElementById('status');
        const messageInput = document.getElementById('message');
        const usernameInput = document.getElementById('username');
        let ws = null;
        let reconnectInterval = null;

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + location.host + '/ws');

            ws.onopen = function() {
                statusDiv.textContent = 'Connected';
                statusDiv.className = 'status connected';
                addSystemMessage('Connected to chat server');
                if (reconnectInterval) {
                    clearInterval(reconnectInterval);
                    reconnectInterval = null;
                }
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.user && data.text) {
                        addMessage(data.user, data.text);
                    }
                } catch (e) {
                    // Handle non-JSON messages or client count updates
                    if (event.data.includes('client_count')) {
                        const data = JSON.parse(event.data);
                        addSystemMessage(data.count + ' users online');
                    }
                }
            };

            ws.onclose = function() {
                statusDiv.textContent = 'Disconnected';
                statusDiv.className = 'status disconnected';
                addSystemMessage('Disconnected from server');
                // Try to reconnect every 3 seconds
                if (!reconnectInterval) {
                    reconnectInterval = setInterval(connect, 3000);
                }
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
        }

        function addMessage(user, text) {
            const div = document.createElement('div');
            div.className = 'chat-message';
            div.innerHTML = '<span class="user">' + escapeHtml(user) + ':</span><span class="text">' + escapeHtml(text) + '</span>';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'chat-message system';
            div.innerHTML = '<span class="user">System:</span><span class="text">' + escapeHtml(text) + '</span>';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const username = usernameInput.value.trim() || 'Guest';
            const text = messageInput.value.trim();

            if (!text) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addSystemMessage('Not connected to server');
                return;
            }

            const message = JSON.stringify({ user: username, text: text });
            ws.send(message);
            messageInput.value = '';
        }

        // Send on Enter key
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Connect on page load
        connect();
    </script>
</body>
</html>
{% end %}
